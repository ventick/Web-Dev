<div class="app-shell">
  <header class="header">
    <p class="header__eyebrow">Lab 5</p>
    <h1>Online Store Categories</h1>
    <p>Select a category to load 5 real Kaspi products.</p>
  </header>

  <section class="category-panel">
    @for (category of categories(); track category.id) {
      <button
        type="button"
        class="category-button"
        [class.category-button--active]="selectedCategory()?.id === category.id"
        (click)="selectCategory(category)"
      >
        {{ category.name }}
      </button>
    }
  </section>

  @if (selectedCategory()) {
    <app-product-list
      [products]="selectedProducts()"
      [categoryName]="selectedCategory()!.name"
      (productDeleted)="handleProductDeleted($event)"
      (productLiked)="handleProductLiked($event)"
    />
  } @else {
    <section class="welcome">
      <p>Please choose a category to see the products.</p>
    </section>
  }
</div>
